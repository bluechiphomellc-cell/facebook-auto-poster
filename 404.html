<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Facebook Auto Poster</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --border-subtle: rgba(255,255,255,0.06);
            --text-primary: #f0f0f5; --text-secondary: #9898b0; --text-tertiary: #5e5e78;
            --accent-blue: #4f7df9; --accent-blue-hover: #6b93ff;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
            --radius-sm: 8px; --radius-md: 12px;
            --max-width: 1120px;
        }
        html { -webkit-font-smoothing: antialiased; }
        body { font-family: var(--font-main); background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
        a { color: inherit; text-decoration: none; }

        .nav { padding: 0 24px; background: rgba(10,10,15,0.8); border-bottom: 1px solid var(--border-subtle); }
        .nav-inner { max-width: var(--max-width); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.05rem; }
        .nav-logo img { height: 32px; width: auto; }

        .error-page { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
        .error-content { max-width: 480px; }
        .error-code { font-family: var(--font-mono); font-size: 6rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1; color: var(--text-tertiary); margin-bottom: 16px; }
        .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.02em; }
        .error-desc { font-size: 1rem; color: var(--text-secondary); margin-bottom: 32px; line-height: 1.7; }
        .error-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; background: var(--accent-blue); color: #fff; font-size: 0.95rem; font-weight: 600; border-radius: var(--radius-md); transition: background 0.2s, transform 0.15s; }
        .error-btn:hover { background: var(--accent-blue-hover); transform: translateY(-1px); }

        .footer { padding: 40px 24px; border-top: 1px solid var(--border-subtle); }
        .footer-inner { max-width: var(--max-width); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
        .footer-copy { font-size: 0.82rem; color: var(--text-tertiary); }
        .footer-links { display: flex; gap: 24px; }
        .footer-links a { font-size: 0.82rem; color: var(--text-tertiary); transition: color 0.2s; }
        .footer-links a:hover { color: var(--text-secondary); }

        @media (max-width: 768px) {
            .error-code { font-size: 4rem; }
            .footer-inner { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-logo"><img src="assets/logo.png" alt="Facebook Auto Poster"></a>
        </div>
    </nav>

    <div class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">This page doesn't exist.</h1>
            <p class="error-desc">Whatever you were looking for isn't here. Maybe it moved. Maybe it never existed. Either way, let's get you back on track.</p>
            <a href="/" class="error-btn">
                Back to Home
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-copy">&copy; 2026 Facebook Auto Poster. All rights reserved.</span>
            <div class="footer-links">
                <a href="privacy.html">Privacy Policy</a>
                <a href="terms.html">Terms of Service</a>
                <a href="refund.html">Refund Policy</a>
            </div>
        </div>
    </footer>
</body>
</html>
